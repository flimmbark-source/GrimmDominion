<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimm Dominion - Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/main.css">
</head>
<body class="bg-gray-900 text-gray-200 flex flex-col h-screen p-4">
    <div class="ui-panel p-4 rounded-lg mb-4 w-full max-w-5xl mx-auto text-center flex-shrink-0">
        <h1 class="font-medieval text-3xl text-purple-300">Grimm Dominion - Prototype</h1>
        <p class="text-gray-400">Status: <span class="font-semibold text-green-400">Milestone 2</span> | Current Step: <span class="font-semibold text-yellow-400">Inventory Management</span></p>
    </div>

    <div id="gameContainer" class="w-full max-w-5xl mx-auto flex-grow relative rounded-lg overflow-hidden">
        <canvas id="gameCanvas"></canvas>

        <div id="hudOverlay" class="absolute inset-0 z-20 pointer-events-none">
            <div id="heroStatusPanel" class="hud-section hud-top-left pointer-events-auto">
                <div class="hud-label">Hero</div>
                <div class="hud-row">
                    <span class="hud-metric">Gold</span>
                    <span id="heroGoldText" class="hud-value text-yellow-200">0</span>
                </div>
                <div class="hud-row">
                    <span class="hud-metric">Health</span>
                    <span id="heroHealthText" class="hud-value">100/100</span>
                </div>
                <div class="hud-bar">
                    <div id="heroHealthBar" class="hud-bar-fill health-bar-fill"></div>
                </div>
                <div class="hud-row">
                    <span class="hud-metric">Stealth</span>
                    <span id="detectionMeterText" class="hud-value text-red-200">HIDDEN</span>
                </div>
                <div class="hud-bar hud-bar-thin">
                    <div id="detectionMeterFill" class="hud-bar-fill detection-bar-fill"></div>
                </div>
            </div>

            <div id="phasePanel" class="hud-section phase-panel hud-top-right pointer-events-auto">
                <div class="hud-label text-right">Phase</div>
                <div class="phase-stack">
                    <div id="phaseName" class="phase-title"></div>
                    <div id="phaseTimer" class="phase-timer">00:00</div>
                </div>
                <div class="phase-castle-block">
                    <div id="castleProbeLabel" class="phase-probe-state"></div>
                    <div class="hud-bar hud-bar-thin phase-probe-bar">
                        <div id="castleProbeProgress" class="hud-bar-fill" style="width: 0%;"></div>
                    </div>
                    <div id="runObjectiveText" class="phase-objective"></div>
                </div>
            </div>

            <div class="run-summary-bar">
                <div class="run-tally run-tally-saved">
                    <div id="runVillagesSaved" class="tally-value">0/3</div>
                    <div class="tally-label">Saved</div>
                </div>
                <div id="runTimeText" class="run-time">00:00</div>
                <div class="run-tally run-tally-lost">
                    <div id="runVillagesLost" class="tally-value">0/2</div>
                    <div class="tally-label">Lost</div>
                </div>
            </div>

            <div id="inventoryDock" class="hud-section inventory-panel hud-bottom-center pointer-events-auto">
                <div class="hud-label text-center">Inventory</div>
                <div id="inventoryPanel" class="inventory-grid"></div>
            </div>
        </div>

        <div id="shopPanel" class="hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 ui-panel p-4 rounded-lg w-96 z-20">
            <h2 class="font-medieval text-2xl text-center text-yellow-300 mb-4">Secret Tavern</h2>
            <div id="shopItemsContainer" class="flex flex-col space-y-2"></div>
        </div>

        <div id="tooltipPanel" class="hidden absolute ui-panel p-2 rounded-md text-sm pointer-events-none z-50"></div>

        <div id="gameOverScreen" class="hidden absolute inset-0 bg-black bg-opacity-75 flex flex-col justify-center items-center z-30 p-4">
            <div class="ui-panel p-8 rounded-lg text-center w-full max-w-xl">
                <h2 id="runSummaryTitle" class="font-medieval text-5xl text-red-400">Dominion Falls</h2>
                <p id="runSummarySubtitle" class="text-lg mt-4 text-gray-200"></p>
                <div class="grid grid-cols-2 gap-4 mt-6 text-left">
                    <div>
                        <div class="text-xs uppercase tracking-widest text-gray-400">Time Survived</div>
                        <div id="runSummaryTime" class="text-lg font-semibold text-gray-100">00:00</div>
                    </div>
                    <div>
                        <div class="text-xs uppercase tracking-widest text-gray-400">Villages Saved</div>
                        <div id="runSummaryVillagesSaved" class="text-lg font-semibold text-green-300">0/3</div>
                    </div>
                    <div>
                        <div class="text-xs uppercase tracking-widest text-gray-400">Villages Lost</div>
                        <div id="runSummaryVillagesLost" class="text-lg font-semibold text-red-300">0/2</div>
                    </div>
                    <div>
                        <div class="text-xs uppercase tracking-widest text-gray-400">Castle Probe</div>
                        <div id="runSummaryCastleProbe" class="text-lg font-semibold text-gray-100">0%</div>
                    </div>
                </div>
                <button
                    id="runSummaryRestart"
                    class="mt-8 px-6 py-2 bg-purple-600 hover:bg-purple-700 transition rounded-md text-white font-semibold"
                >
                    Play Again
                </button>
            </div>
        </div>

        <div id="draggedItemIcon" class="item-icon hidden"></div>
    </div>

    <script type="module" src="./scripts/main.js"></script>
</body>
</html>
